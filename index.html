<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/break-ic.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Critical CSS inline: prevents background flash before JS/CSS loads -->
    <style>
      html, body { margin: 0; padding: 0; background-color: #f2f3f4; }
    </style>

    <!-- Preload local fonts (critical weights used above the fold) -->
    <link rel="preload" as="font" type="font/ttf" href="/fonts/static/Nunito-ExtraBold.ttf" crossorigin>
    <link rel="preload" as="font" type="font/ttf" href="/fonts/static/Nunito-SemiBold.ttf" crossorigin>

    <!-- Preload LCP images -->
    <link rel="preload" as="image" href="/assets/Home-desktop.png" fetchpriority="high" media="(min-width: 769px)">
    <link rel="preload" as="image" href="/assets/Home-mobile.png" fetchpriority="high" media="(max-width: 768px)">

    <!-- Meta tags SEO de base (seront remplacés par React) -->
    <title>Pomocha – App Pomodoro Gamifiée | Focus, Badges & Stats</title>
    <meta name="description" content="Restez concentré avec Pomocha : minuteur Pomodoro, missions quotidiennes, badges et statistiques. L'app qui rend le focus addictif. Gratuit pour étudiants et freelances.">
    <meta name="keywords" content="Pomodoro, minuteur Pomodoro, technique Pomodoro, productivité, concentration, focus, deep work, récompenses, gamification, statistiques, temps de travail, gestion du temps, application Pomodoro, timer Pomodoro, Pomocha, app étudiants, app freelances">
    <meta name="author" content="Pomocha">
    <meta name="theme-color" content="#667eea">
    
    <!-- Directives pour les moteurs de recherche -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <meta name="googlebot" content="index, follow">
    <meta name="google" content="notranslate">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.pomocha.fr/">
    <meta property="og:title" content="Pomocha – App Pomodoro Gamifiée | Focus, Badges & Stats">
    <meta property="og:description" content="Minuteur Pomodoro avec système de récompenses, missions quotidiennes et statistiques détaillées. Transformez votre concentration en progression mesurable.">
    <meta property="og:image" content="https://www.pomocha.fr/pomocha-og.png">
    <meta property="og:site_name" content="Pomocha">
    <meta property="og:locale" content="fr_FR">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://www.pomocha.fr/">
    <meta name="twitter:title" content="Pomocha – App Pomodoro Gamifiée | Focus, Badges & Stats">
    <meta name="twitter:description" content="Restez concentré avec des sessions Pomodoro, débloquez des badges et suivez votre progression. L'app qui rend le focus addictif.">
    <meta name="twitter:image" content="https://www.pomocha.fr/pomocha-og.png">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.pomocha.fr/">

    <!-- Hreflang : version française sur .fr, version anglaise sur .io -->
    <link rel="alternate" hreflang="fr" href="https://www.pomocha.fr/" />
    <link rel="alternate" hreflang="en" href="https://www.pomocha.io/" />
    <link rel="alternate" hreflang="x-default" href="https://www.pomocha.fr/" />
    
    <!-- Google Site Verification (remplacez par votre code réel) -->
    <!-- <meta name="google-site-verification" content="VOTRE_CODE_ICI"> -->

    <!-- Structured Data: Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Service",
      "name": "pomocha",
      "description": "pomocha est une application de pomodoro gamifié, gestion de projets et développement personnel.",
      "provider": {
        "@type": "Organization",
        "name": "pomocha"
      },
      "url": "https://www.pomocha.fr/"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
